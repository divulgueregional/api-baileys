version: '3.3'
services:
  api-baileys:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - http_proxy
        - https_proxy
        - no_proxy
    image: whats-api/server:latest
    ports:
      - "8000:8081"
    volumes:
      - ./instances_data:/app/instances_data
      - ./instance_data:/app/instance_data
    stdin_open: true  # -i
    tty: true         # -t
    networks:
      - api-baileys-network

networks:
  api-baileys-network:
    driver: bridge

